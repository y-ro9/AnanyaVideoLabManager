name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger के लिए

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter Pillow reportlab openpyxl pyinstaller
    
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name="AnanyaVideoLabManager" --add-data "modules;modules" main.py
    
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: AnanyaVideoLabManager-Windows
        path: dist/*.exe
        compression-level: 0
    
    - name: Upload for release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/*.exe